name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t crm-api:latest .

      - name: Build UI image
        run: docker build -f Dockerfile.ui -t crm-ui:latest .

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/crm-key.pem
          chmod 600 ~/.ssh/crm-key.pem
          echo "${{ secrets.EC2_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Copy files to EC2
        run: |
          ssh -i ~/.ssh/crm-key.pem -o UserKnownHostsFile=~/.ssh/known_hosts ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "mkdir -p ~/code-repo-manager"
          scp -i ~/.ssh/crm-key.pem \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -r \
            docker-compose.yml \
            Dockerfile.api \
            Dockerfile.ui \
            requirements.base.txt \
            requirements.api.txt \
            requirements.ui.txt \
            api/ core/ storage/ config/ agents/ ui/ mcp_server/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/code-repo-manager/

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/crm-key.pem -o UserKnownHostsFile=~/.ssh/known_hosts ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "cd ~/code-repo-manager && echo 'POSTGRES_HOST=postgres' > .env && echo 'POSTGRES_PORT=5432' >> .env && echo 'POSTGRES_DB=code_repo_manager' >> .env && echo 'POSTGRES_USER=postgres' >> .env && echo 'POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}' >> .env && echo 'SECRET_KEY=${{ secrets.SECRET_KEY }}' >> .env && echo 'API_BASE_URL=http://${{ secrets.EC2_HOST }}:8000' >> .env && docker-compose down && docker-compose up --build -d && docker image prune -f && echo 'Deployment complete'"
