name: Build and Deploy

# ── When to run this workflow ──────────────────────────────────────────────────
on:
  push:
    branches:
      - main          # runs every time you push to main branch
  workflow_dispatch:  # also allows manual trigger from GitHub UI

# ── Jobs ───────────────────────────────────────────────────────────────────────
# A workflow has one or more jobs. Jobs run in parallel by default.
# We use needs: to make deploy wait for build to finish.

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Build Docker images and verify they build successfully
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest    # GitHub provides this free Linux machine to run steps

    steps:
      # Step 1: Download your code onto the GitHub runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Build the API image to verify it builds without errors
      - name: Build API image
        run: docker build -f Dockerfile.api -t crm-api:latest .

      # Step 3: Build the UI image to verify it builds without errors
      - name: Build UI image
        run: docker build -f Dockerfile.ui -t crm-ui:latest .

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy to EC2 — only runs after build succeeds
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build    # wait for build job to pass before deploying

    steps:
      # Step 1: Download your code (needed to copy files to EC2)
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up SSH key so GitHub can connect to your EC2
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          # Write the EC2 private key from GitHub Secrets
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/crm-key.pem
          chmod 600 ~/.ssh/crm-key.pem
          # Tell SSH to trust your EC2 host (prevents "unknown host" prompt)
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # Step 3: Create app directory on EC2
      - name: Create app directory on EC2
        run: |
          ssh -i ~/.ssh/crm-key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "mkdir -p /home/${{ secrets.EC2_USER }}/code-repo-manager"

      # Step 4: Copy your project files to EC2
      - name: Copy files to EC2
        run: |
          scp -i ~/.ssh/crm-key.pem -r \
            docker-compose.yml \
            Dockerfile.api \
            Dockerfile.ui \
            requirements.txt \
            api/ \
            core/ \
            storage/ \
            config/ \
            agents/ \
            ui/ \
            mcp_server/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/code-repo-manager/

      # Step 5: SSH into EC2 and run docker-compose
      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/crm-key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd /home/$USER/code-repo-manager

            # Write .env file from GitHub Secrets (never stored in repo)
            # ENABLE_BACKUP is intentionally omitted — defaults to false on production
            cat > .env << ENVEOF
          POSTGRES_HOST=postgres
          POSTGRES_PORT=5432
          POSTGRES_DB=code_repo_manager
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          API_BASE_URL=http://${{ secrets.EC2_HOST }}:8000
          ENVEOF

            # Pull latest images and restart containers
            docker-compose down
            docker-compose up --build -d

            # Clean up old unused images to save disk space
            docker image prune -f

            echo "✅ Deployment complete"
          EOF
